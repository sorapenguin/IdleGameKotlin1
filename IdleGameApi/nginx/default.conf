server {
    listen 80;
    server_name x162-43-22-7.static.xvps.ne.jp;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name x162-43-22-7.static.xvps.ne.jp;

    ssl_certificate     /etc/letsencrypt/live/x162-43-22-7.static.xvps.ne.jp/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/x162-43-22-7.static.xvps.ne.jp/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    server_tokens off;
    add_header X-Frame-Options           "SAMEORIGIN"                            always;
    add_header X-Content-Type-Options    "nosniff"                               always;
    add_header X-XSS-Protection          "1; mode=block"                         always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"       always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains"   always;

    location / {
        proxy_pass         http://app:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout    60;
        proxy_connect_timeout 60;
    }
}
