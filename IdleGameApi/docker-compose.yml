version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: idlegame_postgres
    environment:
      POSTGRES_DB: idlegame_db
      POSTGRES_USER: idlegame_user
      POSTGRES_PASSWORD: idlegame_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U idlegame_user -d idlegame_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
