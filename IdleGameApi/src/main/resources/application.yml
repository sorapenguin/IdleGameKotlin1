spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/idlegame_db}
    username: ${SPRING_DATASOURCE_USERNAME:idlegame_user}
    password: ${SPRING_DATASOURCE_PASSWORD:idlegame_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  jackson:
    time-zone: Asia/Tokyo
    date-format: yyyy-MM-dd'T'HH:mm:ss

server:
  port: ${PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:IdleGameApiSecretKey2024-ChangeThisInProduction-MustBe256BitsLong!!}
    expiration: 86400000  # 24時間 (ms)

logging:
  level:
    com.example.idlegameapi: DEBUG
    org.springframework.security: INFO
