apiVersion: 1

groups:
  - orgId: 1
    name: main
    folder: alerts
    interval: 1m
    rules:
      - uid: alert-cpu-high
        title: CPU使用率 80%超
        condition: C
        for: 5m
        noDataState: NoData
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus-main
            relativeTimeRange:
              from: 600
              to: 0
            model:
              editorMode: code
              expr: 100 - (avg(irate(node_cpu_seconds_total{mode="idle"}[5m])) * 100)
              instant: true
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              expression: A
              reducer: last
              refId: B
              type: reduce
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [80]
                    type: gt
                  query:
                    params: [C]
                  reducer:
                    type: last
                  type: query
              expression: B
              refId: C
              type: threshold

      - uid: alert-memory-high
        title: メモリ使用率 85%超
        condition: C
        for: 5m
        noDataState: NoData
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus-main
            relativeTimeRange:
              from: 600
              to: 0
            model:
              editorMode: code
              expr: 100 * (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes))
              instant: true
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              expression: A
              reducer: last
              refId: B
              type: reduce
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [85]
                    type: gt
                  query:
                    params: [C]
                  reducer:
                    type: last
                  type: query
              expression: B
              refId: C
              type: threshold

      - uid: alert-container-down
        title: APIコンテナ停止
        condition: C
        for: 1m
        noDataState: NoData
        execErrState: Error
        data:
          - refId: A
            datasourceUid: prometheus-main
            relativeTimeRange:
              from: 600
              to: 0
            model:
              editorMode: code
              expr: absent(container_last_seen{name="idlegame-api"})
              instant: true
              refId: A
          - refId: B
            datasourceUid: __expr__
            model:
              expression: A
              reducer: last
              refId: B
              type: reduce
          - refId: C
            datasourceUid: __expr__
            model:
              conditions:
                - evaluator:
                    params: [0]
                    type: gt
                  query:
                    params: [C]
                  reducer:
                    type: last
                  type: query
              expression: B
              refId: C
              type: threshold
